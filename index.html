<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JosherIsFound - The Ultimate Intro</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@900&family=Press+Start+2P&display=swap');

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #000;
            color: #fff;
            font-family: 'Orbitron', sans-serif;
        }

        #canvas-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        /* Overlay UI */
        .ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            pointer-events: none;
            text-align: center;
        }

        .chapter-title {
            font-family: 'Press Start 2P', cursive;
            font-size: 20px;
            color: rgba(255, 255, 255, 0.5);
            margin-bottom: 20px;
            opacity: 0;
            transition: opacity 1s;
        }

        /* Final Reveal Styles */
        #final-text {
            display: none;
            flex-direction: column;
            gap: 20px;
        }

        .hero-name {
            font-size: 6rem;
            text-transform: uppercase;
            background: linear-gradient(to bottom, #fff, #00f2ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 30px #00f2ff);
            animation: pulse 2s infinite alternate;
        }

        .sub-text {
            font-size: 2rem;
            letter-spacing: 10px;
            color: #7000ff;
        }

        .join-btn {
            margin-top: 40px;
            font-size: 1.5rem;
            color: #ff0055;
            text-shadow: 0 0 10px #ff0055;
            animation: flicker 0.5s infinite;
        }

        @keyframes pulse {
            from { transform: scale(1); filter: drop-shadow(0 0 20px #00f2ff); }
            to { transform: scale(1.05); filter: drop-shadow(0 0 50px #00f2ff); }
        }

        @keyframes flicker {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }

        /* Loading progress bar for the 180s journey */
        #progress-container {
            position: absolute;
            bottom: 20px;
            width: 80%;
            height: 4px;
            background: rgba(255,255,255,0.1);
            border-radius: 2px;
        }
        #progress-bar {
            width: 0%;
            height: 100%;
            background: #00f2ff;
            box-shadow: 0 0 10px #00f2ff;
        }
    </style>
</head>
<body>

    <div id="canvas-container"></div>
    
    <div class="ui-layer">
        <div id="chapter-label" class="chapter-title">INITIALIZING...</div>
        
        <div id="final-text">
            <div class="hero-name">JosherIsFound</div>
            <div class="sub-text">IS NOW PLAYING<br>east.catpvp.net</div>
            <div class="join-btn">⚔ JOIN THE BATTLE ⚔</div>
        </div>

        <div id="progress-container">
            <div id="progress-bar"></div>
        </div>
    </div>

    <script>
        let scene, camera, renderer, particles;
        let clock = new THREE.Clock();
        let currentChapter = 0;
        const totalDuration = 180; // Seconds

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.getElementById('canvas-container').appendChild(renderer.domElement);

            createParticles(2000, 0x00ff00); // Start with Minecraft Green
            camera.position.z = 50;

            animate();
        }

        function createParticles(count, color) {
            if (particles) scene.remove(particles);
            
            const geometry = new THREE.BufferGeometry();
            const positions = new Float32Array(count * 3);
            
            for (let i = 0; i < count * 3; i++) {
                positions[i] = (Math.random() - 0.5) * 150;
            }
            
            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            const material = new THREE.PointsMaterial({ size: 0.8, color: color });
            particles = new THREE.Points(geometry, material);
            scene.add(particles);
        }

        function updateChapter(time) {
            const label = document.getElementById('chapter-label');
            const progress = (time / totalDuration) * 100;
            document.getElementById('progress-bar').style.width = progress + '%';

            // Chapter Logic
            if (time < 25 && currentChapter !== 1) {
                currentChapter = 1;
                label.innerText = "CHAPTER I: MINECRAFT ORIGINS";
                label.style.opacity = 1;
                createParticles(3000, 0x3d9e3d); // Minecraft Green
            } else if (time >= 25 && time < 50 && currentChapter !== 2) {
                currentChapter = 2;
                label.innerText = "CHAPTER II: NEON ROBLOX DIMENSION";
                createParticles(5000, 0xff00ff); // Roblox Magenta
            } else if (time >= 50 && time < 80 && currentChapter !== 3) {
                currentChapter = 3;
                label.innerText = "CHAPTER III: THE NETHER IGNITION";
                createParticles(8000, 0xff4400); // Fire Orange
            } else if (time >= 80 && time < 120 && currentChapter !== 4) {
                currentChapter = 4;
                label.innerText = "CHAPTER IV: COSMIC CONVERGENCE";
                createParticles(10000, 0x00f2ff); // Galaxy Blue
            } else if (time >= 120 && time < 155 && currentChapter !== 5) {
                currentChapter = 5;
                label.innerText = "CHAPTER V: CATPVP ARENA OPENING";
                createParticles(15000, 0xffffff); // White Lightning
            } else if (time >= 155 && currentChapter !== 6) {
                currentChapter = 6;
                label.style.display = "none";
                document.getElementById('progress-container').style.display = "none";
                document.getElementById('final-text').style.display = "flex";
                createParticles(20000, 0x7000ff); // Final Void Purple
            }
        }

        function animate() {
            requestAnimationFrame(animate);
            let elapsed = clock.getElapsedTime();
            
            if (elapsed <= totalDuration) {
                updateChapter(elapsed);
            }

            // Particle movement
            particles.rotation.y += 0.002;
            particles.rotation.x += 0.001;

            if (currentChapter === 4) {
                // Spiral Vortex Effect
                particles.rotation.z += 0.05;
                camera.position.z = 50 + Math.sin(elapsed) * 20;
            }

            if (currentChapter === 5) {
                // Arena Chaos
                particles.position.z += Math.sin(elapsed * 10) * 0.5;
            }

            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        window.onload = init;
    </script>
</body>
</html>
